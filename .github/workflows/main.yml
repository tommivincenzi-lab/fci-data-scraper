name: Aggiornamento Automatico Dati FCI

# Regole di attivazione
on:
  schedule:
    # Esegue lo script ogni giorno alle 18:00 UTC (19:00 o 20:00 in Italia)
    - cron: '0 18 * * *'
  # Permette di avviare lo script manualmente dalla scheda "Actions"
  workflow_dispatch:

# Permessi necessari per permettere alla GitHub Action di scrivere nel repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout del codice
        uses: actions/checkout@v3

      # 2. Configura l'ambiente Python 3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. Esegue lo script di estrazione
      - name: Esegui lo script estrattore
        run: python estrattore.py

      # 4. Salva il file CSV e lo carica sul repository
      - name: Salva e Pusha il CSV nel repository
        run: |
          # Configura l'identità del bot di GitHub
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Aggiunge il file CSV aggiornato
          git add risultati_juniores.csv
          
          # Crea un commit solo se ci sono modifiche effettive, altrimenti termina con successo
          git commit -m "Update dati: $(date)" || exit 0
          
          # Sincronizza con eventuali modifiche fatte manualmente sul repository prima di caricare
          git pull --rebase origin main
          
          # Invia i dati al repository
          git push
